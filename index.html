
<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAABRINA Control</title>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <style>
    :root {
      --bg: #0f172a;
      --card: #020617;
      --on: #22c55e;
      --off: #ef4444;
      --text: #e5e7eb;
      --muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(160deg, #020617, #0f172a);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      text-align: center;
    }

    h1 {
      margin: 0 0 0.25rem;
      font-size: 2rem;
      letter-spacing: 0.1em;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      flex-direction: column;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 1.25rem;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    button:active {
      transform: scale(0.97);
    }

    .on {
      background: var(--on);
      color: #022c22;
      box-shadow: 0 8px 20px rgba(34,197,94,0.35);
    }

    .off {
      background: var(--off);
      color: #450a0a;
      box-shadow: 0 8px 20px rgba(239,68,68,0.35);
    }

    .status {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--muted);
    }

    @media (min-width: 600px) {
      .buttons {
        flex-direction: row;
      }

      button {
        flex: 1;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>SAABRINA</h1>
    <div class="subtitle">@carbage_9760</div>

    <div class="buttons">
      <button class="on" onclick="sendMessage1()">TÆND</button>
      <button class="off" onclick="sendMessage2()">SLUK</button>
    </div>

    <div class="status" id="status">
      Ikke forbundet…
    </div>
  </div>

  <script>
    // MQTT – uændret
    const client = mqtt.connect(
      "wss://74476603474245c3af4012fa421215a2.s1.eu.hivemq.cloud:8884/mqtt",
      {
        username: "Qwit_ED",
        password: "GlemDetDu1",
        clean: true,
        connectTimeout: 4000,
        reconnectPeriod: 1000
      }
    );

    const statusEl = document.getElementById("status");

    client.on("connect", () => {
      statusEl.textContent = "Forbundet til Saabrina ✅";
    });

    client.on("reconnect", () => {
      statusEl.textContent = "Genforbinder…";
    });

    client.on("error", () => {
      statusEl.textContent = "Forbindelsesfejl ❌";
    });

    function sendMessage1() {
      client.publish("emil/test", "1");
      statusEl.textContent = "TÆNDT 🔥";
    }

    function sendMessage2() {
      client.publish("emil/test", "0");
      statusEl.textContent = "SLUKKET ⛔";
    }
  </script>
</body>
</html>
