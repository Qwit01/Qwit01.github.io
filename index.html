<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Smart POP</title>

<style>
body { display:flex; font-family:Arial; background:#f5f7fb; }
.sidebar { width:220px; background:#1f2a44; color:white; padding:20px; }
.sidebar ul { list-style:none; padding-left:0; }
.sidebar li { margin:10px 0; display:flex; justify-content:space-between; align-items:center; }
.sidebar li span { cursor:pointer; }
.main { flex:1; padding:20px; }
.box { background:white; padding:15px; border-radius:10px; margin-bottom:20px; }
button { padding:8px; margin:5px; }
.deleteBtn {
    background:#e63946;
    border:none;
    color:white;
    padding:3px 6px;
    border-radius:4px;
    cursor:pointer;
    font-size:12px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>Smart POP</h2>
    <ul id="patientList"></ul>

    <h3>Tilføj patient</h3>
    <input id="newPatient" placeholder="Navn">
    <button onclick="addPatient()">Tilføj</button>
</div>

<div class="main">
    <h1>Patientoverblik</h1>

    <div class="box">
        <h2>Alle patienter</h2>
        <div id="overview"></div>
    </div>
</div>

<script>
// Init database
if(!localStorage.getItem("patients")) {
    const demo = [
        {id:1, name:"Kirsten Jensen", pops:[]},
        {id:2, name:"Poul Eriksen", pops:[]}
    ];
    localStorage.setItem("patients", JSON.stringify(demo));
}

// Hent data
function getPatients() {
    return JSON.parse(localStorage.getItem("patients"));
}

// Gem data
function savePatients(data) {
    localStorage.setItem("patients", JSON.stringify(data));
}

// Slet patient
function deletePatient(id) {
    let patients = getPatients();
    patients = patients.filter(p => p.id !== id);
    savePatients(patients);
    renderSidebar();
    renderOverview();
}

// Render sidebar
function renderSidebar() {
    const list = document.getElementById("patientList");
    list.innerHTML = "";

    getPatients().forEach(p => {
        list.innerHTML += `
        <li>
            <span onclick="openPatient(${p.id})">
                ${p.name} (${p.pops.length})
            </span>
            <button class="deleteBtn" onclick="deletePatient(${p.id})">X</button>
        </li>`;
    });
}

// Åbn patient side – med ID i URL
function openPatient(id) {
    window.location.href = "patient.html?id=" + id;
}

// Tilføj patient
function addPatient() {
    const name = document.getElementById("newPatient").value;
    if(!name) return;

    let patients = getPatients();
    const id = Date.now();

    patients.push({id, name, pops:[]});
    savePatients(patients);

    document.getElementById("newPatient").value = "";
    renderSidebar();
    renderOverview();
}

// Oversigt
function renderOverview() {
    const div = document.getElementById("overview");
    div.innerHTML = "";

    getPatients().forEach(p => {
        div.innerHTML += `
        <p><b>${p.name}</b> - POP'er: ${p.pops.length}</p>
        `;
    });
}

// Init
renderSidebar();
renderOverview();
</script>

</body>
</html>
